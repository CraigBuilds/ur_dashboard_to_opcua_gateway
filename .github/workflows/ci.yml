name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.8.3"
          - os: ubuntu-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install unit-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./code[test]"

      - name: Run architecture and unit tests
        run: python -m pytest -m "not system"

      - name: Check command
        run: ur_dashboard_to_opcua_gateway --help

  quality:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.8.3"
          cache: pip

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./code[format,type-check]"

      - name: Check types
        run: python -m mypy --config-file code/pyproject.toml

      - name: Check formatting
        run: |
          python -m black --config code/pyproject.toml --check code/src tests
          python -m mdformat --check --wrap 160 README.md AGENTS.md docs tests/README.md

  system:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./code[system-test]"

      - name: Run system tests
        run: python -m pytest -m system
