[build-system]
requires = ["setuptools>=69,<76"]
build-backend = "setuptools.build_meta"

[project]
name = "universal-robots-clients"
version = "0.2.0"
description = "Focused Python clients for Universal Robots controllers and program assets"
readme = "README.md"
requires-python = ">=3.8.3"
authors = [
    { name = "CraigBuilds" },
]
keywords = ["dashboard-server", "industrial", "robotics", "rtde", "universal-robots"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Manufacturing",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Documentation = "https://github.com/CraigBuilds/ur_dashboard_to_opcua_gateway/tree/main/packages/universal_robots_clients"
Issues = "https://github.com/CraigBuilds/ur_dashboard_to_opcua_gateway/issues"
Repository = "https://github.com/CraigBuilds/ur_dashboard_to_opcua_gateway"

[project.optional-dependencies]
sftp = [
    "paramiko>=3.5,<4",
]
rtde = [
    "ur-rtde>=1.6.3,<2",
]
test = [
    "pytest>=8,<10",
]
all = [
    "paramiko>=3.5,<4",
    "ur-rtde>=1.6.3,<2",
]
dev = [
    "build>=1.2,<2",
    "paramiko>=3.5,<4",
    "pytest>=8,<10",
    "twine>=5,<7",
    "ur-rtde>=1.6.3,<2",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
universal_robots_clients = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.black]
line-length = 160
target-version = ["py38"]
skip-magic-trailing-comma = true
