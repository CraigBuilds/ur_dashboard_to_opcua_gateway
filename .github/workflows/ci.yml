name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8.3"
          - "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install unit-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./code[test]"

      - name: Run unit tests
        run: python -m pytest -c tests/pytest.ini -m "not system"

      - name: Check command
        run: ur_dashboard_to_opcua_gateway --help

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8.3"
          cache: pip

      - name: Install formatting dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./code[format]"

      - name: Check formatting
        run: |
          python -m black --config code/pyproject.toml --check code/src tests
          python -m mdformat --check --wrap 160 README.md docs

  system:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./code[system-test]"

      - name: Run system tests
        run: python -m pytest -c tests/pytest.ini -m system
