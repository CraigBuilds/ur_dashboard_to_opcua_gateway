[build-system]
requires = ["setuptools>=69,<76"]
build-backend = "setuptools.build_meta"

[project]
name = "declarative-opcua-server"
version = "0.2.0"
description = "Create an opinionated OPC UA server from flat Python function interfaces"
readme = "README.md"
requires-python = ">=3.8.3"
dependencies = [
    "asyncua==1.1.5; python_version < '3.10'",
    "asyncua==2.0.1; python_version >= '3.10'",
]

[project.optional-dependencies]
test = [
    "pytest>=8,<10",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 160
target-version = ["py38"]
skip-magic-trailing-comma = true
