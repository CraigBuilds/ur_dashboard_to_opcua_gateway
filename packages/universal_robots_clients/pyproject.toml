[build-system]
requires = ["setuptools>=69,<76"]
build-backend = "setuptools.build_meta"

[project]
name = "universal-robots-clients"
version = "0.2.0"
description = "Focused Python clients for Universal Robots controllers and program assets"
readme = "README.md"
requires-python = ">=3.8.3"
dependencies = []

[project.optional-dependencies]
sftp = [
    "paramiko>=3.5,<4",
]
rtde = [
    "ur-rtde==1.6.3",
]
test = [
    "pytest>=8,<10",
]
all = [
    "paramiko>=3.5,<4",
    "ur-rtde==1.6.3",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 160
target-version = ["py38"]
skip-magic-trailing-comma = true
